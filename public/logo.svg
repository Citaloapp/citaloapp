<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" width="220" height="56" role="img" aria-label="Citalo logo">
  <!-- Calendar icon -->
  <rect x="4" y="10" width="40" height="38" rx="6" fill="#0ea5e9"/>
  <!-- Calendar top bar -->
  <rect x="4" y="10" width="40" height="13" rx="6" fill="#0284c7"/>
  <rect x="4" y="17" width="40" height="6" fill="#0284c7"/>
  <!-- Calendar hooks -->
  <rect x="14" y="6" width="4" height="10" rx="2" fill="#0369a1"/>
  <rect x="30" y="6" width="4" height="10" rx="2" fill="#0369a1"/>
  <!-- Checkmark inside calendar -->
  <polyline points="14,34 20,41 34,27" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark: "Citalo" -->
  <text x="56" y="37" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="600" letter-spacing="-0.5" fill="#1e293b">
    <tspan fill="#0ea5e9">C</tspan>italo
  </text>
</svg>
